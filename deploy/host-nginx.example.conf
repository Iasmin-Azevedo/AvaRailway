# Exemplo para Nginx instalado diretamente na VPS (Hostinger).
# Copie para /etc/nginx/sites-available/avamj e ajuste server_name e SSL.
#
# Pré-requisito: docker compose com backend publicado em 127.0.0.1:8000
# (veja docker-compose.yml — porta só no localhost).

upstream avamj_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name seu-dominio.com.br www.seu-dominio.com.br;

    client_max_body_size 50m;
    gzip on;
    gzip_types application/json text/css application/javascript text/plain;

    location / {
        proxy_pass http://avamj_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
