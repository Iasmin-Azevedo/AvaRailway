<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <header class="navbar navbar-expand navbar-light bg-white border-bottom shadow-sm px-4 py-2">
        <div class="container-fluid d-flex align-items-center justify-content-between">

            <div class="d-flex align-items-center">
                <img src="caminho-da-sua-logo.png" alt="AVA MJ" height="40" class="me-2">
                <span class="h4 fw-bold mb-0 text-dark d-none d-md-block">AVA MJ</span>
            </div>

            <div class="d-flex align-items-center">

                <div class="position-relative me-4">
                    <img src="https://ui-avatars.com/api/?name=Weslem+Silva&background=0D6EFD&color=fff"
                        class="rounded-circle border border-2 border-primary" width="45" height="45" alt="Avatar">
                </div>

                <div class="text-start me-3">
                    <div class="d-flex align-items-center justify-content-start mb-1">
                        <span class="fw-bold text-dark me-2">Weslem Silva</span>
                        <span class="badge bg-light text-muted border">2º Ano</span>
                    </div>

                    <div class="d-flex flex-column w-100">

                        <div class="progress flex-grow-1" style="height: 8px; width: 100%;">
                            <div class="progress-bar bg-warning" role="progressbar" style="width: 36%;"
                                aria-valuenow="216" aria-valuemin="0" aria-valuemax="600"></div>
                        </div>
                        <div class="d-flex align-items-center justify-content-between mt-1">
                            <span class="badge bg-primary rounded-pill me-2">Lvl 12</span>
                            <small class="text-muted ms-2 fw-bold" style="font-size: 0.75rem;">216/600 XP</small>
                        </div>
                    </div>
                </div>

                <div class="d-flex align-items-center bg-light border rounded-pill px-3 py-2 me-3">
                    <div class="d-flex align-items-center me-3 text-warning">
                        <i class="fas fa-star me-2"></i>
                        <span class="fw-bold text-dark small">450</span>
                    </div>
                    <div class="vr text-muted opacity-25"></div>
                    <div class="d-flex align-items-center ms-3 text-danger">
                        <i class="fas fa-fire me-2"></i>
                        <span class="fw-bold text-dark small">7 dias</span>
                    </div>
                </div>

                <a href="#" class="btn btn-link text-danger p-0 ms-2" title="Sair">
                    <i class="fas fa-sign-out-alt fa-lg"></i>
                </a>

            </div>
        </div>
    </header>
</body>

</html>
