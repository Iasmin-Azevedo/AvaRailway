# Produção na VPS (ex.: Hostinger): use Nginx no próprio servidor como reverse proxy.
# O backend fica escutando apenas em 127.0.0.1:8000 — não exponha Uvicorn na internet.
#
# Subir só app + banco: docker compose up -d
# Redis / Ollama (opcional): docker compose --profile cache up -d
# Desenvolvimento local com bind na máquina: altere temporariamente ports para "8000:8000".
#
# Após git pull que altere alembic/ ou ficheiros copiados no Dockerfile: reconstrua a imagem
# (o código dentro do container não vem do disco do host): docker compose build --no-cache backend && docker compose up -d

services:
  backend:
    build: .
    container_name: avamj-backend
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: avamj-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: avamj
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_USER: ${MYSQL_USER:-avamj}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-avamj}
    # Sem publicação na rede do host: só o backend (rede Docker) acessa o MySQL.
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      # $$ vira $ no Compose — no container expande MYSQL_ROOT_PASSWORD.
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 40
      start_period: 45s

  redis:
    image: redis:7-alpine
    container_name: avamj-redis
    restart: unless-stopped
    profiles:
      - cache
    ports:
      - "127.0.0.1:6379:6379"

  ollama:
    image: ollama/ollama:latest
    container_name: avamj-ollama
    restart: unless-stopped
    profiles:
      - ai
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  mysql_data:
  ollama_data:
