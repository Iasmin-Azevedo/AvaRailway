<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block page_title %}AVA MJ{% endblock %}</title>
    <link rel="shortcut icon" href="/static/img/icon.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    {% include 'partials/utilbar_mj.html' %}
    <div id="a11y-caption-panel" class="d-none container py-2" role="region" aria-label="Legenda e descrição">
        <div class="alert alert-secondary border-mj-primary border-opacity-25 mb-0 small rounded-4">
            <strong class="text-mj-dark"><i class="fas fa-closed-captioning me-1"></i> Legenda / descrição</strong>
            <p class="mb-0 mt-1 text-mj-dark" id="a11y-caption-body"></p>
        </div>
    </div>
    {% block public_body %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% include 'partials/accessibility_scripts.html' %}
    {% block extra_scripts %}{% endblock %}
</body>
</html>
