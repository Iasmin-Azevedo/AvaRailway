<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block page_title %}Dashboard{% endblock %} - AVA MJ</title>
    <link rel="shortcut icon" href="/static/img/icon.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body class="mission-page-mj bg-mj-soft min-vh-100">
    {% include 'partials/utilbar_mj.html' %}

    <header class="mission-topbar-mj py-3 mission-shell-mj">
        <div class="container d-flex align-items-center justify-content-between">
            <a href="{% block brand_link %}/{% endblock %}" class="text-decoration-none d-flex align-items-center gap-2">
                <img src="/static/img/logo.png" alt="AVA MJ" width="200">
            </a>

            <button
                class="navbar-toggler d-lg-none border-0 p-2"
                type="button"
                data-bs-toggle="offcanvas"
                data-bs-target="#dashboardMenuMobile"
                aria-controls="dashboardMenuMobile"
                aria-label="Abrir menu"
            >
                <i class="fas fa-bars fs-4 text-mj-dark"></i>
            </button>

            <div class="d-none d-lg-flex align-items-center gap-3">
                {% block header_right %}{% endblock %}
                <a class="btn bg-transparent border-0" href="/auth/logout" aria-label="Sair"><i class="fas fa-sign-out-alt text-danger"></i></a>
            </div>
        </div>
    </header>

    <div class="offcanvas offcanvas-end w-100 d-lg-none" tabindex="-1" id="dashboardMenuMobile" aria-labelledby="dashboardMenuMobileLabel">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title fw-bold text-mj-dark" id="dashboardMenuMobileLabel">{% block menu_title %}Menu{% endblock %}</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Fechar"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column gap-3">
            {% block offcanvas_extra %}{% endblock %}
            <hr class="my-2">
            {% block offcanvas_links %}{% endblock %}
            <a class="btn btn-outline-danger w-100 rounded-pill mt-auto" href="/auth/logout">Sair</a>
        </div>
    </div>

    <main class="container py-4">
        {% block main_content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
